# Spring Framework and application log
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n


# H2 Memory Database Engine Configuration
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


# Hibernate Dialect Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Create table from Entity class before inserting data
spring.jpa.hibernate.ddl-auto=create


# Run data.sql after Hibernate creates tables
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true